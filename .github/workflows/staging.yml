name: Staging CI

on:
  push:
    branches: [ dev ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{secrets.STAGING_NEXT_PUBLIC_BACKEND_URL}}
            NEXT_PUBLIC_LANDING_PAGE_URL=${{secrets.STAGING_NEXT_PUBLIC_LANDING_PAGE_URL}}
            NEXT_PUBLIC_SIGNIN_URL=${{secrets.STAGING_NEXT_PUBLIC_SIGNIN_URL}}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  notify:
    name: Notify Subscribers
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: "Notify Docker deploy Repo"
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.TOKEN }}
          repository: Qudra-IO/docker-deploy
          event-type: aqila-frontend.build
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}", "branch": "dev"}'